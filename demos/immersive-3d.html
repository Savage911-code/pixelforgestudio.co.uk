<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VOID — Immersive 3D Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow:hidden;}
body{background:#000;color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;cursor:none;height:100vh;}

/* CURSOR */
.cur{position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
.cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .1s;}

/* MAIN CANVAS */
#world{position:fixed;inset:0;z-index:0;}

/* SCROLL CONTAINER */
#scroll-container{position:fixed;inset:0;z-index:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
#scroll-content{height:800vh;/* 8 screen heights of scroll */}

/* HUD / UI */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:20;}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff0080,#7c3aed,#00d4ff,#ff0080);background-size:200% auto;animation:gradMove 3s linear infinite;width:0%;transition:width .1s;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;padding:24px 60px;display:flex;justify-content:space-between;align-items:center;z-index:15;pointer-events:all;}
.nav-logo{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:900;letter-spacing:.3em;background:linear-gradient(135deg,#ff0080,#7c3aed,#00d4ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradMove 4s linear infinite;}
.nav-scroll{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);}

/* SECTION TITLES */
.section-title{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .6s ease,transform .6s ease;
  will-change:opacity,transform;
}
.section-title.visible{opacity:1;}
.section-title h2{font-family:'Cinzel',serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:900;line-height:.95;letter-spacing:-.02em;}
.section-title p{font-size:.9rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:16px;}

/* BOTTOM UI */
.bottom-ui{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:15;display:flex;align-items:center;gap:24px;
  font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);
  pointer-events:none;
}
.scroll-indicator{display:flex;align-items:center;gap:8px;}
.scroll-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);animation:scrollPulse 1.5s infinite;}
.scroll-dot:nth-child(2){animation-delay:.2s;}
.scroll-dot:nth-child(3){animation-delay:.4s;}
.section-counter{font-family:'Cinzel',serif;font-size:.85rem;color:rgba(255,255,255,.2);}

/* SIDE LABELS */
.side-label{
  position:fixed;right:24px;top:50%;transform:translateY(-50%) rotate(90deg);
  font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.15);
  z-index:10;pointer-events:none;transition:color .5s;
}

@keyframes gradMove{0%{background-position:0% center}100%{background-position:200% center}}
@keyframes scrollPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-50%) translateY(30px)}to{opacity:1;transform:translate(-50%,-50%) translateY(0)}}
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<canvas id="world"></canvas>

<div id="scroll-container">
  <div id="scroll-content"></div>
</div>

<div id="hud">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <nav class="nav">
    <div class="nav-logo">VOID</div>
    <div class="nav-scroll" id="scrollLabel">Scroll to explore</div>
  </nav>

  <!-- Section titles shown at different scroll positions -->
  <div class="section-title" id="title-0">
    <h2 style="background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">ENTER<br/>THE VOID</h2>
    <p>Scroll to begin your journey</p>
  </div>

  <div class="section-title" id="title-1">
    <h2 style="background:linear-gradient(135deg,#ff0080,#ff4d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">THROUGH<br/>FIRE</h2>
    <p>The journey begins</p>
  </div>

  <div class="section-title" id="title-2">
    <h2 style="background:linear-gradient(135deg,#7c3aed,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">INTO THE<br/>NEBULA</h2>
    <p>Stars being born</p>
  </div>

  <div class="section-title" id="title-3">
    <h2 style="background:linear-gradient(135deg,#00d4ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">BEYOND<br/>LIGHT</h2>
    <p>Breaking the barrier</p>
  </div>

  <div class="section-title" id="title-4">
    <h2 style="background:linear-gradient(135deg,#ff0080,#7c3aed,#00d4ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradMove 3s linear infinite;">WE BUILD<br/>WORLDS</h2>
    <p>PixelForge Studio — pixelforgestudio.co.uk</p>
  </div>

  <div class="bottom-ui">
    <div class="scroll-indicator">
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
    </div>
    <div class="section-counter" id="sectionCounter">01 / 05</div>
    <div class="scroll-indicator">
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
    </div>
  </div>

  <div class="side-label" id="sideLabel">VOID — IMMERSIVE EXPERIENCE</div>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('curRing');
let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();

// CANVAS
const canvas=document.getElementById('world'),ctx=canvas.getContext('2d');
let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});
const CX=()=>W/2,CY=()=>H/2;

// SCROLL
const scroller=document.getElementById('scroll-container');
let scrollY=0,targetScrollY=0,smoothScroll=0;
let scrollProgress=0;// 0-1
const TOTAL_SECTIONS=5;
const SECTION_HEIGHT=window.innerHeight;

scroller.addEventListener('scroll',()=>{
  scrollY=scroller.scrollTop;
  scrollProgress=scrollY/(scroller.scrollHeight-H);
  document.getElementById('progressFill').style.width=(scrollProgress*100)+'%';
  const section=Math.floor(scrollProgress*TOTAL_SECTIONS);
  document.getElementById('sectionCounter').textContent=
    String(Math.min(section+1,TOTAL_SECTIONS)).padStart(2,'0')+' / '+String(TOTAL_SECTIONS).padStart(2,'0');
  updateSectionTitles(scrollProgress);
});

function updateSectionTitles(p){
  const titles=document.querySelectorAll('.section-title');
  titles.forEach((t,i)=>{
    const start=i/TOTAL_SECTIONS;
    const end=(i+1)/TOTAL_SECTIONS;
    const mid=(start+end)/2;
    const dist=Math.abs(p-mid);
    const visible=dist<.08;
    t.classList.toggle('visible',visible);
  });
}
updateSectionTitles(0);

// Smooth scroll value
let lScrollY=0;
function getLerpedScroll(){
  lScrollY+=(scrollY-lScrollY)*.07;
  return lScrollY;
}

// =============================================
// 3D WORLD
// =============================================
const FL=400;// focal length for perspective

function project(x,y,z){
  if(z<=0)return null;
  const scale=FL/z;
  return{x:CX()+x*scale,y:CY()+y*scale,scale};
}

// =============================================
// STARS — infinite tunnel
// =============================================
class Star{
  constructor(init=false){this.reset(init);}
  reset(init=false){
    this.x=(Math.random()-.5)*3000;
    this.y=(Math.random()-.5)*3000;
    this.z=init?Math.random()*2000:2000;
    this.r=Math.random()*2+.5;
    this.speed=Math.random()*3+1;
    const cols=['255,255,255','200,180,255','180,220,255','255,220,200','255,150,100'];
    this.color=cols[Math.floor(Math.random()*cols.length)];
    this.trail=[];
  }
  update(camSpeed){
    this.z-=camSpeed;
    if(this.z<1)this.reset();
  }
  draw(ctx,prevZ){
    const p=project(this.x,this.y,this.z);
    if(!p)return;
    const alpha=Math.min(1,(2000-this.z)/500);
    const size=p.scale*this.r*.5;
    // Star dot
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.3,size),0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.color},${alpha})`;ctx.fill();
    // Speed trail
    if(prevZ&&prevZ>this.z){
      const p2=project(this.x,this.y,prevZ);
      if(p2&&Math.abs(p2.x-p.x)>1){
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle=`rgba(${this.color},${alpha*.4})`;
        ctx.lineWidth=Math.max(.3,size*.5);ctx.stroke();
      }
    }
  }
}

// =============================================
// RING TUNNEL
// =============================================
class Ring{
  constructor(z,color,radius){
    this.z=z;this.color=color;this.radius=radius;
    this.rot=Math.random()*Math.PI*2;this.rotSpeed=(Math.random()-.5)*.01;
    this.segments=Math.floor(Math.random()*3)+5;
  }
  update(speed){this.z-=speed;this.rot+=this.rotSpeed;if(this.z<10)this.z+=8000;}
  draw(ctx,alpha=1){
    const p=project(0,0,this.z);if(!p)return;
    const r=this.radius*p.scale;
    if(r<2)return;
    const a=Math.min(1,(8000-this.z)/3000)*alpha;
    ctx.save();ctx.translate(CX(),CY());ctx.rotate(this.rot);
    // Main ring
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${this.color},${a*.5})`;
    ctx.lineWidth=Math.max(.5,p.scale*2);ctx.stroke();
    // Glow
    const glow=ctx.createRadialGradient(0,0,r*.95,0,0,r*1.05);
    glow.addColorStop(0,`rgba(${this.color},${a*.15})`);
    glow.addColorStop(.5,`rgba(${this.color},${a*.08})`);
    glow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.lineWidth=r*.1;ctx.strokeStyle=glow;ctx.stroke();
    // Tick marks
    for(let i=0;i<this.segments;i++){
      const angle=(i/this.segments)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle)*r*.95,Math.sin(angle)*r*.95);
      ctx.lineTo(Math.cos(angle)*r*1.05,Math.sin(angle)*r*1.05);
      ctx.strokeStyle=`rgba(${this.color},${a})`;ctx.lineWidth=Math.max(.5,p.scale*3);ctx.stroke();
    }
    ctx.restore();
  }
}

// =============================================
// FLOATING GEOMETRY
// =============================================
class FloatingObj{
  constructor(){this.reset();}
  reset(){
    this.x=(Math.random()-.5)*1200;
    this.y=(Math.random()-.5)*800;
    this.z=Math.random()*3000+500;
    this.type=Math.floor(Math.random()*4);// 0=cube,1=tetra,2=sphere,3=torus
    this.size=Math.random()*30+10;
    this.rotX=Math.random()*Math.PI*2;this.rotY=Math.random()*Math.PI*2;
    this.rotSpeedX=(Math.random()-.5)*.02;this.rotSpeedY=(Math.random()-.5)*.02;
    const cs=['255,0,128','124,58,237','0,212,255','255,204,0','0,255,136','255,80,0'];
    this.color=cs[Math.floor(Math.random()*cs.length)];
    this.floatY=Math.random()*Math.PI*2;this.floatSpeed=Math.random()*.01+.005;
  }
  update(speed){
    this.z-=speed;this.rotX+=this.rotSpeedX;this.rotY+=this.rotSpeedY;
    this.floatY+=this.floatSpeed;this.y+=Math.sin(this.floatY)*.3;
    if(this.z<50)this.reset();
  }
  draw(ctx){
    const p=project(this.x,this.y,this.z);if(!p)return;
    const s=this.size*p.scale;if(s<1)return;
    const a=Math.min(.8,(3000-this.z)/1000);if(a<.01)return;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(this.rotX+this.rotY);
    ctx.strokeStyle=`rgba(${this.color},${a})`;ctx.lineWidth=Math.max(.5,p.scale*1.5);
    ctx.shadowColor=`rgba(${this.color},${a*.5})`;ctx.shadowBlur=s*.5;
    if(this.type===0){// wireframe cube
      const h=s*.6;
      [-h,h].forEach(z2=>{ctx.beginPath();ctx.rect(-h,-h,h*2,h*2);ctx.stroke();});
      [[-h,-h],[h,-h],[h,h],[-h,h]].forEach(([vx,vy])=>{ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vx*1.4,vy*1.4);ctx.stroke();});
    } else if(this.type===1){// triangle
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.87,s*.5);ctx.lineTo(-s*.87,s*.5);ctx.closePath();ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,s*.6);ctx.lineTo(0,-s*.3);ctx.stroke();
    } else if(this.type===2){// wireframe sphere rings
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.ellipse(0,0,s,s*Math.sin((i+1)*.5),i*.5,0,Math.PI*2);ctx.stroke();
      }
    } else{// cross/plus
      ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.moveTo(0,-s);ctx.lineTo(0,s);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.4,0,Math.PI*2);ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

// =============================================
// NEBULA CLOUDS
// =============================================
class NebulaCloud{
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=(Math.random()-.5)*2000;this.y=(Math.random()-.5)*2000;
    this.z=init?Math.random()*5000:5000+Math.random()*2000;
    this.w=Math.random()*500+200;this.h=Math.random()*300+100;
    this.rot=Math.random()*Math.PI*2;
    const cs=['139,92,246','0,212,255','255,0,128','16,185,129','245,158,11'];
    this.color=cs[Math.floor(Math.random()*cs.length)];
    this.alpha=Math.random()*.15+.05;
  }
  update(speed){this.z-=speed*.3;if(this.z<100)this.reset();}
  draw(ctx){
    const p=project(this.x,this.y,this.z);if(!p)return;
    const w=this.w*p.scale,h=this.h*p.scale;
    if(w<2)return;
    const a=Math.min(this.alpha,(5000-this.z)/2000*this.alpha);
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(this.rot);
    const g=ctx.createRadialGradient(0,0,0,0,0,w*.7);
    g.addColorStop(0,`rgba(${this.color},${a})`);
    g.addColorStop(.4,`rgba(${this.color},${a*.4})`);
    g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.ellipse(0,0,w*.7,h*.5,0,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }
}

// =============================================
// WARP SPEED LINES
// =============================================
class WarpLine{
  constructor(){this.reset();}
  reset(){
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*Math.max(W,H)*.8+100;
    this.x=Math.cos(angle)*dist;this.y=Math.sin(angle)*dist;
    this.z=Math.random()*500+100;
    this.alpha=Math.random()*.6+.2;
    const cs=['255,255,255','200,180,255','100,200,255','255,150,100'];
    this.color=cs[Math.floor(Math.random()*cs.length)];
  }
  update(speed){this.z-=speed*2;if(this.z<1)this.reset();}
  draw(ctx){
    const p=project(this.x,this.y,this.z);if(!p)return;
    const p2=project(this.x,this.y,this.z+speed*40);
    if(!p2)return;
    const a=Math.min(1,(500-this.z)/300)*this.alpha;
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);
    ctx.strokeStyle=`rgba(${this.color},${a})`;
    ctx.lineWidth=Math.max(.3,p.scale*.5);ctx.stroke();
  }
}

// =============================================
// INIT OBJECTS
// =============================================
const stars=[];for(let i=0;i<600;i++)stars.push(new Star(true));
const rings=[];
const ringColors=['139,92,246','0,212,255','255,0,128','255,204,0','16,185,129'];
for(let i=0;i<30;i++)rings.push(new Ring(i*(8000/30)+500,ringColors[i%5],200+Math.random()*150));
const objects=[];for(let i=0;i<50;i++)objects.push(new FloatingObj());
const nebulae=[];for(let i=0;i<30;i++)nebulae.push(new NebulaCloud());
const warpLines=[];for(let i=0;i<150;i++)warpLines.push(new WarpLine());

// =============================================
// CAMERA / SPEED
// =============================================
let speed=3;
let targetSpeed=3;
let prevStarZ=[];
let animT=0;

// Section-based speed and effects
function getSectionData(p){
  const section=p*TOTAL_SECTIONS;
  if(section<1) return{speed:3,warp:0,ringAlpha:0.3,objAlpha:1,scene:'space'};
  if(section<2) return{speed:8,warp:.6,ringAlpha:.8,objAlpha:.8,scene:'fire'};
  if(section<3) return{speed:15,warp:.3,ringAlpha:1,objAlpha:.6,scene:'nebula'};
  if(section<4) return{speed:25,warp:1,ringAlpha:.6,objAlpha:.3,scene:'warp'};
  return{speed:5,warp:.2,ringAlpha:.4,objAlpha:.5,scene:'arrival'};
}

// =============================================
// BACKGROUND per section
// =============================================
function drawBackground(p){
  ctx.clearRect(0,0,W,H);
  const section=p*TOTAL_SECTIONS;
  // Base gradient that transitions with scroll
  let bg;
  if(section<1){
    // Deep space - near black
    bg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H));
    bg.addColorStop(0,'#020208');bg.addColorStop(1,'#000');
  } else if(section<2){
    // Fire section
    bg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H));
    const t=(section-1);
    bg.addColorStop(0,`rgba(${Math.floor(30*t)},${Math.floor(5*t)},0,1)`);
    bg.addColorStop(.5,`rgba(${Math.floor(15*t)},0,0,1)`);
    bg.addColorStop(1,'#000');
  } else if(section<3){
    // Nebula - purple/blue
    bg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H));
    const t=(section-2);
    bg.addColorStop(0,`rgba(${Math.floor(20*t)},0,${Math.floor(40*t)},1)`);
    bg.addColorStop(.5,`rgba(0,${Math.floor(10*t)},${Math.floor(30*t)},1)`);
    bg.addColorStop(1,'#000');
  } else if(section<4){
    // Warp - electric
    bg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H));
    bg.addColorStop(0,'rgba(0,10,25,1)');bg.addColorStop(1,'#000');
  } else{
    // Arrival - warm
    bg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H)*.6);
    bg.addColorStop(0,'rgba(10,5,20,1)');bg.addColorStop(1,'#000');
  }
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
}

// =============================================
// MAIN RENDER LOOP
// =============================================
function render(){
  const sp=getLerpedScroll();
  const p=Math.min(1,sp/(scroller.scrollHeight-H||1));
  const data=getSectionData(p);
  animT+=0.016;

  // Speed
  targetSpeed=data.speed+(Math.sin(animT*.5)*.5);
  speed+=(targetSpeed-speed)*.05;

  // BACKGROUND
  drawBackground(p);

  // NEBULAE (back layer)
  nebulae.forEach(n=>{n.update(speed*.2);n.draw(ctx);});

  // STARS
  const savedZ=stars.map(s=>s.z);
  stars.forEach((s,i)=>{
    s.update(speed);
    s.draw(ctx,savedZ[i]);
  });

  // RINGS
  rings.forEach(r=>{
    r.update(speed);
    r.draw(ctx,data.ringAlpha);
  });

  // FLOATING OBJECTS
  if(data.objAlpha>0.1){
    objects.forEach(o=>{
      o.update(speed);
      ctx.globalAlpha=data.objAlpha;
      o.draw(ctx);
      ctx.globalAlpha=1;
    });
  }

  // WARP LINES (high speed sections)
  if(data.warp>0){
    ctx.globalAlpha=data.warp;
    warpLines.forEach(w=>{w.update(speed);w.draw(ctx);});
    ctx.globalAlpha=1;
  }

  // CENTER GLOW (dynamic color)
  const glowColors=[
    [139,92,246],[255,80,0],[0,150,255],[0,212,255],[255,100,200]
  ];
  const ci=Math.floor(p*TOTAL_SECTIONS)%glowColors.length;
  const [gr,gg,gb]=glowColors[ci];
  const cg=ctx.createRadialGradient(CX()+Math.sin(animT*.3)*20,CY()+Math.cos(animT*.2)*15,0,CX(),CY(),300);
  cg.addColorStop(0,`rgba(${gr},${gg},${gb},.12)`);
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  // Screen vignette
  const vig=ctx.createRadialGradient(CX(),CY(),Math.min(W,H)*.2,CX(),CY(),Math.min(W,H)*.8);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // MOUSE PARALLAX on whole scene
  const mOffX=(mx/W-.5)*20;
  const mOffY=(my/H-.5)*15;
  canvas.style.transform=`translate(${mOffX}px,${mOffY}px)`;

  requestAnimationFrame(render);
}
render();

// Touch/wheel to scroll
let touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;});
document.addEventListener('touchmove',e=>{
  const dy=touchStartY-e.touches[0].clientY;
  scroller.scrollTop+=dy;touchStartY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// Keyboard scroll
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='PageDown')scroller.scrollTop+=H*.15;
  if(e.key==='ArrowUp'||e.key==='PageUp')scroller.scrollTop-=H*.15;
});
</script>
</body>
</html>
